<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="250" cy="250" r="230" fill="#0f172a" stroke="#1e293b" stroke-width="8" />
  
  <path d="M 250 20 A 230 230 0 0 1 480 250" fill="none" stroke="#22d3ee" stroke-width="4" stroke-dasharray="10 20" opacity="0.6" />
  <path d="M 250 480 A 230 230 0 0 1 20 250" fill="none" stroke="#f43f5e" stroke-width="4" stroke-dasharray="10 20" opacity="0.6" />

  <g opacity="0.8">
    <circle cx="100" cy="180" r="6" fill="#22d3ee" filter="url(#glow-cyan)" />
    <path d="M 106 180 C 130 180, 140 200, 160 200" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 4" />
    
    <circle cx="90" cy="260" r="8" fill="#f43f5e" filter="url(#glow-pink)" />
    <path d="M 98 260 C 120 260, 130 240, 160 240" fill="none" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4 4" />
    
    <circle cx="110" cy="340" r="5" fill="#a855f7" />
    <path d="M 115 340 C 140 340, 145 320, 160 320" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="4 4" />
    
    <circle cx="410" cy="220" r="6" fill="#22d3ee" filter="url(#glow-cyan)" />
    <path d="M 340 220 C 370 220, 380 220, 404 220" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 4" />
  </g>

  <path d="M 160 100 L 280 100 L 340 160 L 340 400 L 160 400 Z" fill="#1e293b" stroke="#22d3ee" stroke-width="6" stroke-linejoin="round" />
  
  <path d="M 280 100 L 280 160 L 340 160" fill="#334155" stroke="#22d3ee" stroke-width="6" stroke-linejoin="round" />

  <text x="250" y="160" fill="#22d3ee" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">&lt;/&gt;</text>
  <line x1="190" y1="200" x2="250" y2="200" stroke="#64748b" stroke-width="8" stroke-linecap="round" />
  <line x1="190" y1="240" x2="310" y2="240" stroke="#64748b" stroke-width="8" stroke-linecap="round" />
  <line x1="190" y1="280" x2="280" y2="280" stroke="#64748b" stroke-width="8" stroke-linecap="round" />
  <line x1="190" y1="320" x2="240" y2="320" stroke="#64748b" stroke-width="8" stroke-linecap="round" />

  <g transform="translate(10, 10)">
    <circle cx="300" cy="300" r="55" fill="#0f172a" fill-opacity="0.8" />
    <circle cx="300" cy="300" r="55" fill="none" stroke="#f43f5e" stroke-width="12" filter="url(#glow-pink)" />
    <path d="M 260 270 A 40 40 0 0 1 310 255" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4" />
    <line x1="340" y1="340" x2="400" y2="400" stroke="#f43f5e" stroke-width="20" stroke-linecap="round" />
    <line x1="340" y1="340" x2="400" y2="400" stroke="#1e293b" stroke-width="8" stroke-linecap="round" stroke-dasharray="15 5" />
  </g>
</svg>
